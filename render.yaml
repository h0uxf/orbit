services:
  - type: web
    name: orbit-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=packages/shared && npm run build --workspace=backend
    startCommand: npm run start --workspace=backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        sync: false # must be a 32-byte key, hex or base64 — see README
      - key: FRONTEND_URL
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: orbit-db
    plan: free
